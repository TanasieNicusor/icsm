<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-files}">
</head>
<link rel="stylesheet" th:href="@{/css/policy.css}">

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div style="padding: 8rem 5% 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>My <span>Notifications</span></h1>
            <div style="display: flex; gap: 1rem;">
                <form th:action="@{/notifications/read-all}" method="post">
                    <button type="submit" class="btn btn-outline" style="font-size: 0.85rem;">Mark all as read</button>
                </form>
            </div>
        </div>

        <div th:if="${param.replied}" style="background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 1rem; border-radius: 10px; margin-bottom: 2rem; border: 1px solid rgba(34, 197, 94, 0.2);">
            Reply sent successfully!
        </div>

        <div class="policy-card" style="width: 100%; max-width: none; padding: 0; overflow: hidden;">
            <div th:each="notif : ${notifications}" 
                 th:class="${'notification-item ' + (notif.read ? '' : 'unread')}"
                 style="padding: 1.5rem; border-bottom: 1px solid var(--glass-border); transition: var(--transition); display: flex; flex-direction: column; gap: 1rem;">
                
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
                            <span th:class="${'type-badge ' + notif.type}" th:text="${#strings.replace(notif.type, '_', ' ')}"
                                  style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.25rem 0.6rem; border-radius: 4px; background: rgba(99, 102, 241, 0.1); color: #818cf8; font-weight: 700;">SYSTEM</span>
                            <h3 th:text="${notif.title}" style="margin: 0; font-size: 1.1rem;">Notification Title</h3>
                        </div>
                        <p th:text="${notif.message}" style="color: var(--text-muted); line-height: 1.5; margin-bottom: 0.75rem; white-space: pre-wrap;">This is the notification message content.</p>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <small th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy, HH:mm')}" style="color: #64748b; font-size: 0.8rem;">10 May 2026, 14:00</small>
                            <small th:if="${notif.sender != null}" th:text="${'From: ' + notif.sender.fullName}" style="color: #818cf8; font-weight: 600; font-size: 0.8rem;">From: John Doe</small>
                        </div>
                    </div>

                    <div style="display: flex; gap: 0.5rem;">
                        <button th:if="${notif.sender != null}" class="btn btn-outline" 
                                th:onclick="'toggleReply(' + ${notif.id} + ')'"
                                style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Reply</button>
                                
                        <form th:if="${!notif.read}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post">
                            <button type="submit" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Read</button>
                        </form>

                        <form th:action="@{/notifications/{id}/delete(id=${notif.id})}" method="post">
                            <button type="submit" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">Remove</button>
                        </form>
                    </div>
                </div>

                <!-- Reply Form (Hidden by default) -->
                <div th:id="${'reply-form-' + notif.id}" style="display: none; padding-top: 1rem; border-top: 1px dashed var(--glass-border);">
                    <form th:action="@{/notifications/{id}/reply(id=${notif.id})}" method="post">
                        <textarea name="replyMessage" class="form-control" rows="3" placeholder="Type your response here..." required style="margin-bottom: 1rem; background: rgba(255,255,255,0.02);"></textarea>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Send Response</button>
                            <button type="button" class="btn btn-outline" th:onclick="'toggleReply(' + ${notif.id} + ')'" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" style="padding: 4rem; text-align: center; color: var(--text-muted);">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🔔</div>
                <p>No notifications found.</p>
            </div>
        </div>
    </div>

    <script>
        function toggleReply(id) {
            const form = document.getElementById('reply-form-' + id);
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }
    </script>

    <style>
        .notification-item.unread {
            background: rgba(99, 102, 241, 0.03);
            border-left: 4px solid #6366f1;
        }
        .notification-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .type-badge.message { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .type-badge.claim_confirmation { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .type-badge.policy_application { color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .type-badge.system { color: #818cf8; background: rgba(129, 140, 248, 0.1); }
    </style>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
