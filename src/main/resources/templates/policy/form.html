<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-files}">
</head>
<link rel="stylesheet" th:href="@{/css/auth.css}">
<link rel="stylesheet" th:href="@{/css/policy.css}">

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <h2 style="margin-bottom: 1rem;" th:text="${policy.id == null ? 'Create New Policy' : 'Edit Policy'}">Manage Policy</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Fill in the details to setup a new insurance policy for a customer.</p>

            <form th:action="${policy.id == null ? '/policies/add' : '/policies/' + policy.id + '/edit'}" method="post">
                <input type="hidden" name="id" th:value="${policy.id}">
                
                <div class="form-group">
                    <label>Policy Type</label>
                    <select name="policyType.id" class="form-control" required>
                        <option value="" disabled th:selected="${policy.policyType == null}">Select a plan</option>
                        <option th:each="type : ${policyTypes}" 
                                th:value="${type.id}" 
                                th:text="${type.name}"
                                th:selected="${policy.policyType != null && policy.policyType.id == type.id}">Premium Health Plan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Coverage Amount ($)</label>
                    <input type="number" name="coverageAmount" class="form-control" th:value="${policy.coverageAmount}" placeholder="500000.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>Premium Amount ($)</label>
                    <input type="number" name="premiumAmount" class="form-control" th:value="${policy.premiumAmount}" placeholder="120.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>Payment Frequency</label>
                    <select name="paymentFrequency" class="form-control" required>
                        <option th:each="freq : ${T(com.example.icsm.model.enums.PaymentFrequency).values()}" 
                                th:value="${freq}" 
                                th:text="${freq}"
                                th:selected="${policy.paymentFrequency == freq}">monthly</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" name="startDate" class="form-control" th:value="${policy.startDate}" required>
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" name="endDate" class="form-control" th:value="${policy.endDate}" required>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a th:href="@{/policies}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2;" th:text="${policy.id == null ? 'Create Policy' : 'Update Policy'}">Save</button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
