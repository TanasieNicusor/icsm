<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-files}">
</head>
<link rel="stylesheet" th:href="@{/css/auth.css}">

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <h2 style="margin-bottom: 1rem;" th:text="${claim.id == null ? 'File a Claim' : 'Edit Claim'}">File a Claim
            </h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Please provide details about
                the incident and select the relevant policy.</p>

            <form th:action="${claim.id == null ? '/claim/file' : '/claim/' + claim.id + '/edit'}" method="post">
                <input type="hidden" name="id" th:value="${claim.id}">

                <div class="form-group">
                    <label>Select Policy</label>
                    <select name="policy.id" class="form-control" required>
                        <option value="" disabled th:selected="${claim.policy == null}">Choose a policy</option>
                        <option th:each="policy : ${policies}" th:value="${policy.id}"
                            th:text="${(policy.policyType?.name ?: 'Unknown Type') + ' (#' + policy.id + ')'}"
                            th:selected="${claim.policy != null && claim.policy.id == policy.id}">Policy Name</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Incident Description</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Describe what happened..."
                        th:text="${claim.description}" required></textarea>
                </div>

                <div class="form-group">
                    <label>Estimated Claim Amount ($)</label>
                    <input type="number" name="claim_amount" class="form-control" th:value="${claim.claim_amount}"
                        placeholder="0.00" step="0.01" required>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a th:href="@{/claim}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Claim</button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
