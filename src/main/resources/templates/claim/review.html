<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-files}">
</head>
<link rel="stylesheet" th:href="@{/css/policy.css}">

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div style="padding: 8rem 5% 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Review <span>Claims</span></h1>
            <p style="color: var(--text-muted);">Manage and process pending insurance claims.</p>
        </div>

        <div class="policy-card" style="width: 100%; max-width: none; padding: 0; overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="background: rgba(255,255,255,0.05);">
                    <tr>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">ID</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Customer</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Policy</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Amount</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Status</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="claim : ${claims}" style="border-top: 1px solid var(--glass-border);">
                        <td style="padding: 1.25rem 1.5rem;" th:text="${'#' + claim.id}">#1</td>
                        <td style="padding: 1.25rem 1.5rem;">
                            <div th:text="${claim.customer?.fullName ?: 'Unknown User'}" style="font-weight: 600;">John Doe</div>
                            <div th:text="${claim.customer?.email ?: 'no-email'}" style="font-size: 0.75rem; color: var(--text-muted);">john@example.com</div>
                        </td>
                        <td style="padding: 1.25rem 1.5rem;" th:text="${claim.policy?.policyType?.name ?: 'N/A'}">Health Plan</td>
                        <td style="padding: 1.25rem 1.5rem; font-weight: 700;" th:text="${'$' + (claim.claim_amount ?: '0.00')}">$1,200</td>
                        <td style="padding: 1.25rem 1.5rem;">
                            <span th:class="${'status-badge ' + (claim.status.name() == 'Settled' ? 'status-active' : (claim.status.name() == 'Rejected' ? 'status-rejected' : 'status-pending'))}"
                                  th:text="${claim.status}">Pending</span>
                        </td>
                        <td style="padding: 1.25rem 1.5rem;">
                            <div style="display: flex; gap: 0.5rem;" th:if="${claim.status.name() == 'Pending' || claim.status.name() == 'Under_Review'}">
                                <form th:action="@{/claim/{id}/approve(id=${claim.id})}" method="post">
                                    <button type="submit" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background: #22c55e;">Approve</button>
                                </form>
                                <form th:action="@{/claim/{id}/reject(id=${claim.id})}" method="post">
                                    <button type="submit" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; color: #ef4444; border-color: #ef4444;">Reject</button>
                                </form>
                            </div>
                            <span th:unless="${claim.status.name() == 'Pending' || claim.status.name() == 'Under_Review'}" style="color: var(--text-muted); font-size: 0.85rem;">Processed</span>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(claims)}" style="padding: 4rem; text-align: center; color: var(--text-muted);">
                No claims to review at this time.
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
