<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-files}">
</head>
<link rel="stylesheet" th:href="@{/css/policy.css}">

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div style="padding: 8rem 5% 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>My <span>Claims</span></h1>
            <a th:href="@{/claims/file}" class="btn btn-primary">File New Claim</a>
        </div>

        <div class="policy-grid">
            <div class="policy-card" th:each="claim : ${claims}">
                <div th:class="${'status-badge ' + (claim.status.name() == 'Settled' ? 'status-active' : 'status-pending')}"
                    th:text="${claim.status}">Pending</div>
                <h3 th:text="${claim.policy.policyType.name}" style="margin-bottom: 0.5rem;">Life Insurance</h3>
                <p th:text="${'Claim #: ' + claim.id}"
                    style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">Claim #: CLM-12345</p>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                    <div>
                        <span style="display: block; font-size: 0.75rem; color: var(--text-muted);">Amount</span>
                        <b th:text="${'$' + claim.claim_amount}">$5,000</b>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <a th:href="@{/claims/{id}/edit(id=${claim.id})}" class="btn btn-outline"
                            style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Edit</a>
                        <form th:action="@{/claims/{id}/delete(id=${claim.id})}" method="post" style="display: inline;"
                            onsubmit="return confirm('Are you sure?')">
                            <button type="submit" class="btn btn-outline"
                                style="padding: 0.4rem 0.8rem; font-size: 0.75rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">Delete</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="policy-card" th:if="${#lists.isEmpty(claims)}"
                style="grid-column: 1 / -1; text-align: center; padding: 4rem;">
                <a th:href="@{/claims/file}" class="btn btn-primary" style="margin-top: 1rem; padding: 0.75rem 2rem; font-size: 0.9rem;">File a Claim</a>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
