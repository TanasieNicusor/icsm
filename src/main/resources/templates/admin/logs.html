<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: header-files}"></div>
    <title>Audit Logs - Admin</title>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .table-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.25rem 1.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            font-size: 0.9rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="dark-theme">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="admin-container">
        <h1 style="margin-bottom: 2rem; color: #f8fafc;">Admin Activity Logs</h1>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Admin Email</th>
                        <th>Action Type</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2026-05-10 12:00:00</td>
                        <td th:text="${log.adminEmail}">admin@example.com</td>
                        <td><span class="badge" th:text="${log.actionType}">ACTION</span></td>
                        <td th:text="${log.description}">Description of action</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
