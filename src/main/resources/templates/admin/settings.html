<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: header-files}"></div>
    <title>System Settings - Admin</title>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .settings-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.5rem;
        }

        .settings-card h2 {
            margin-bottom: 2rem;
            color: #f8fafc;
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-submit {
            background: #6366f1;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="dark-theme">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="admin-container">
        <h1 style="margin-bottom: 2rem; color: #f8fafc;">System Settings</h1>

        <div th:if="${param.success}" class="alert-success" style="padding: 1rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; border-radius: 0.75rem; margin-bottom: 1.5rem;">
            Settings updated successfully.
        </div>

        <div class="settings-card">
            <h2>Global Parameters</h2>
            <form th:action="@{/admin/settings}" method="post">
                <div class="form-group" th:each="config : ${configs}">
                    <label th:for="${config.key}" th:text="${config.key}">Setting Key</label>
                    <input type="text" th:id="${config.key}" th:name="${config.key}" th:value="${config.value}" class="form-control" required>
                </div>

                <div style="text-align: right;">
                    <button type="submit" class="btn-submit">Save Configuration</button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
