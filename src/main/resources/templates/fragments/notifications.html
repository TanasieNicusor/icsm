<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="dropdown" class="notification-bell">
        <a th:href="@{/notifications}" style="text-decoration: none; color: inherit; position: relative; cursor: pointer;">
            🔔 <span class="notification-badge" th:if="${unreadCount > 0}" th:text="${unreadCount}" 
                     style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 10px; font-weight: 700;">0</span>
        </a>
    </div>
</body>
</html>
